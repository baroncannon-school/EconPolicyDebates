// =============================================================================

function parseSRT(srtText) {
  const blocks = srtText.trim().split(/\n\s*\n/);
  return blocks.filter(b => b.trim()).map(block => {
    const lines = block.trim().split('\n');
    // Find the timestamp line (contains -->)
    const timeIdx = lines.findIndex(l => l.includes('-->'));
    if (timeIdx < 0) return null;
    const [startStr, endStr] = lines[timeIdx].split('-->').map(s => s.trim());
    const text = lines.slice(timeIdx + 1).join(' ').trim();
    const toSec = (ts) => {
      // Handles both HH:MM:SS,mmm and MM:SS,mmm
      const parts = ts.replace(',', '.').split(':').map(Number);
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      return parts[0];
    };
    return { start: Math.round(toSec(startStr) * 100) / 100, end: Math.round(toSec(endStr) * 100) / 100, text };
  }).filter(Boolean);
}

function formatTime(s) {
  if (!s && s !== 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function extractYouTubeId(input) {
  if (!input) return '';
  input = input.trim();
  // Already an ID (11 chars, alphanumeric + - _)
  if (/^[\w-]{11}$/.test(input)) return input;
  // URL patterns
  const patterns = [
    /(?:youtube\.com\/watch\?v=)([\w-]{11})/,
    /(?:youtu\.be\/)([\w-]{11})/,
    /(?:youtube\.com\/embed\/)([\w-]{11})/,
    /(?:youtube\.com\/v\/)([\w-]{11})/,
  ];
  for (const p of patterns) {
    const m = input.match(p);
    if (m) return m[1];
  }
  return input; // return as-is, let validation catch it
}

  // ===========================================================================

      const errText = await res.text();
      throw new Error(`Claude API error (${res.status}): ${errText}`);
    }
    const data = await res.json();
    return data.content[0].text;
  }, [apiKey]);

    const trans = transcripts[segIdx];
    if (!trans.length) return;

    const newStatus = [...aiStatus];
    newStatus[segIdx] = { ...newStatus[segIdx], outline: 'loading' };

    try {
      const transcriptText = trans.map(t => `${formatTime(t.start)} ${t.text}`).join('\n');

Segment Type: ${seg.type}
Transcript:
${transcriptText}

Return a JSON array of outline items:
[

Team: ${seg.team === 'A' ? teamAName : teamBName}

Transcript:
${transcriptText}

- Questions should test understanding, not just recall

{

}

- position: Summarize each team's core argument in 1-2 clear sentences. Write for a high school audience.
- keyStats: Extract 2-4 specific statistics, data points, or factual claims each team uses as evidence. Quote them closely. If none are found, return an empty array.`

                  <div className="flex items-center justify-between mb-2">
                    <span className="text-xs font-semibold text-gray-500 font-body">Outline</span>
                    <span className={`text-xs font-body ${status.outline === 'done' ? 'text-green-600' : status.outline === 'loading' ? 'text-blue-500' : status.outline === 'error' ? 'text-red-500' : 'text-gray-400'}`}>
                      {status.outline === 'done' ? `✓ ${outlines[i].length} items` : status.outline === 'loading' ? '⏳' : status.outline === 'error' ? '✕ Error' : 'Not yet'}
                    </span>
                  </div>
                  <button onClick={() => generateOutline(i)} disabled={!apiKey || status.outline === 'loading'}
                    className="text-xs text-cedar hover:underline font-body disabled:opacity-50">Generate</button>
                </div>

                <div className="bg-white rounded border border-gray-200 p-3">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-xs font-semibold text-gray-500 font-body">Study Questions</span>
                    <span className={`text-xs font-body ${status.prompts === 'done' ? 'text-green-600' : status.prompts === 'loading' ? 'text-blue-500' : status.prompts === 'error' ? 'text-red-500' : 'text-gray-400'}`}>
                      {status.prompts === 'done' ? `✓ ${prompts[i].length} Qs` : status.prompts === 'loading' ? '⏳' : status.prompts === 'error' ? '✕ Error' : 'Not yet'}
                    </span>
                  </div>
                  <button onClick={() => generatePrompts(i)} disabled={!apiKey || status.prompts === 'loading'}
                    className="text-xs text-cedar hover:underline font-body disabled:opacity-50">Generate</button>
                </div>

                <div className="bg-white rounded border border-gray-200 p-3">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-xs font-semibold text-gray-500 font-body">Key Moments</span>
                    <span className={`text-xs font-body ${status.moments === 'done' ? 'text-green-600' : status.moments === 'loading' ? 'text-blue-500' : status.moments === 'error' ? 'text-red-500' : 'text-gray-400'}`}>
                      {status.moments === 'done' ? `✓ ${keyMoments[i].length} moments` : status.moments === 'loading' ? '⏳' : status.moments === 'error' ? '✕ Error' : 'Not yet'}
                    </span>
                  </div>
                  <button onClick={() => generateKeyMoments(i)} disabled={!apiKey || status.moments === 'loading'}
                    className="text-xs text-cedar hover:underline font-body disabled:opacity-50">Generate</button>
                </div>
              </div>

              {/* Preview generated content */}
              {outlines[i].length > 0 && (
                <div className="mt-3 bg-white rounded border border-gray-200 p-3">
                  <p className="text-xs font-semibold text-gray-500 mb-1 font-body">Outline Preview:</p>
                  {outlines[i].map((item, j) => (
                    <div key={j} className="text-xs text-gray-600 font-body mb-1">
                      <strong>{item.title}</strong> ({formatTime(item.startTime)}–{formatTime(item.endTime)})
                      <ul className="ml-4 list-disc">
                        {item.bullets?.map((b, k) => <li key={k}>{b}</li>)}
                      </ul>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  // -- Step 6: Review & Export --
  const renderStep6 = () => {
    const config = buildConfig();
    const debate = config.debates[0];
    const segsDone = segments.filter(s => s.youtubeId).length;
    const transDone = transcripts.filter(t => t.length > 0).length;
    const outlinesDone = outlines.filter(o => o.length > 0).length;

    return (
      <div className="space-y-6">
        <div className="bg-green-50 border border-green-200 rounded-lg p-5">
          <h3 className="text-lg text-green-800 mb-3">Review Your Debate</h3>
          <div className="grid grid-cols-2 gap-4 text-sm font-body text-green-700">
            <div>
              <p><strong>Topic:</strong> {debate.topic || '(not set)'}</p>
              <p><strong>Period:</strong> {debate.period || '(not set)'}</p>
              <p><strong>{debate.teamA.name}:</strong> {debate.teamA.members.join(', ') || '(no members)'}</p>
              <p><strong>{debate.teamB.name}:</strong> {debate.teamB.members.join(', ') || '(no members)'}</p>
            </div>
            <div>
              <p><strong>Video segments:</strong> {segsDone}/8</p>
              <p><strong>Transcripts:</strong> {transDone}/8</p>
              <p><strong>AI outlines:</strong> {outlinesDone}/8</p>
              <p><strong>Key moments:</strong> {debate.keyMoments.length}</p>
            </div>
          </div>
        </div>

        {(segsDone < 8 || transDone < 8) && (
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-4">
            <p className="text-sm text-amber-800 font-body">
              <strong>Heads up:</strong> Some segments are missing videos or transcripts. You can still export,
              but the student site will have gaps.
            </p>
          </div>
        )}

        <div className="flex gap-4">
          <button onClick={downloadConfig}
            className="px-6 py-3 bg-leather text-white rounded-lg text-base font-semibold font-body hover:bg-leather/90 transition-colors">
            Download debates.json
          </button>
          <button onClick={() => {
            const json = JSON.stringify(buildConfig(), null, 2);
            navigator.clipboard.writeText(json).then(() => alert('Copied to clipboard!'));
          }}
            className="px-6 py-3 bg-white border border-gray-300 text-gray-700 rounded-lg text-base font-semibold font-body hover:bg-gray-50 transition-colors">
            Copy to Clipboard
          </button>
        </div>

        <div className="bg-gray-50 border border-gray-200 rounded-lg p-5">
          <h4 className="font-semibold text-sm text-gray-700 mb-2 font-body">What to do next:</h4>
          <ol className="text-sm text-gray-600 font-body space-y-2 list-decimal list-inside">
            <li>Click <strong>"Download debates.json"</strong> above</li>
            <li>Go to your GitHub repository for this site</li>
            <li>Upload/replace the <code className="bg-gray-200 px-1 rounded">debates.json</code> file in the repository root</li>
            <li>GitHub Pages will automatically update within a few minutes</li>
            <li>Your students will see the new debate on the site!</li>
          </ol>
        </div>

        <details className="border border-gray-200 rounded-lg">
          <summary className="px-4 py-3 cursor-pointer text-sm font-semibold text-gray-600 font-body hover:bg-gray-50">
            Preview raw JSON
          </summary>
          <pre className="p-4 text-xs text-gray-500 overflow-auto max-h-96 bg-gray-50 font-mono">
            {JSON.stringify(config, null, 2)}
          </pre>
        </details>
      </div>
    );
  };

  // ===========================================================================
  // MAIN LAYOUT
  // ===========================================================================

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <header className="bg-leather shadow-md">
        <div className="max-w-4xl mx-auto px-6 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <span className="text-2xl">🛡️</span>
            <div>
              <h1 className="text-lg font-headline text-white leading-tight">Debate Admin Tool</h1>
              <p className="text-xs text-white/60 font-body">{schoolName}</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={() => setShowSettings(!showSettings)}
              className="text-white/60 hover:text-white text-sm font-body">⚙ Settings</button>
            {user && (
              <div className="flex items-center gap-2">
                {user.picture && <img src={user.picture} alt="" className="w-7 h-7 rounded-full border border-white/30" />}
                <span className="text-sm text-white/70 font-body">{user.name}</span>
              </div>
            )}
          </div>
        </div>
      </header>

      {/* Settings Panel */}
      {showSettings && (
        <div className="bg-white border-b border-gray-200 shadow-sm">
          <div className="max-w-4xl mx-auto px-6 py-4">
            <h3 className="text-sm font-semibold text-gray-700 mb-3 font-body">Settings</h3>
            <div className="space-y-3">
              <div>
                <label className="block text-xs font-semibold text-gray-500 mb-1 font-body">Claude API Key</label>
                <div className="flex gap-2">
                  <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)}
                    className="flex-1 border border-gray-300 rounded px-3 py-2 text-sm font-body"
                    placeholder="sk-ant-..." />
                  {apiKey && <button onClick={() => { setApiKey(''); localStorage.removeItem('admin_claudeApiKey'); }}
                    className="text-xs text-red-400 hover:text-red-600 font-body px-2">Clear</button>}
                </div>
                <p className="text-xs text-gray-400 mt-1 font-body">
                  Get a key at <a href="https://console.anthropic.com" target="_blank" className="underline">console.anthropic.com</a>. Stored locally in your browser.
                </p>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Step Progress Bar */}
      <div className="bg-white border-b border-gray-200">
        <div className="max-w-4xl mx-auto px-6 py-3">
          <div className="flex items-center gap-1">
            {STEPS.map((s, i) => (
              <React.Fragment key={s.num}>
                <button
                  onClick={() => setStep(s.num)}
                  className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-body font-semibold transition-colors ${
                    step === s.num
                      ? 'bg-leather text-white'
                      : step > s.num
                        ? 'bg-green-100 text-green-700 hover:bg-green-200'
                        : 'bg-gray-100 text-gray-400 hover:bg-gray-200 hover:text-gray-600'
                  }`}
                >
                  <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs ${
                    step === s.num ? 'bg-white/20' : step > s.num ? 'bg-green-200' : 'bg-gray-200'
                  }`}>
                    {step > s.num ? '✓' : s.num}
                  </span>
                  <span className="hidden sm:inline">{s.title}</span>
                </button>
                {i < STEPS.length - 1 && (
                  <div className={`flex-1 h-0.5 ${step > s.num ? 'bg-green-300' : 'bg-gray-200'}`} />
                )}
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>

      {/* Step Content */}
      <div className="max-w-4xl mx-auto px-6 py-8">
        <div className="mb-6">
          <h2 className="text-2xl font-headline text-leather">{STEPS[step - 1].title}</h2>
          <p className="text-gray-500 font-body mt-1">{STEPS[step - 1].desc}</p>
        </div>

        {renderStepContent()}

        {/* Navigation */}
        <div className="flex justify-between mt-8 pt-6 border-t border-gray-200">
          <button
            onClick={() => setStep(Math.max(1, step - 1))}
            disabled={step === 1}
            className="px-6 py-2.5 bg-gray-100 text-gray-600 rounded-lg text-sm font-body font-semibold hover:bg-gray-200 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
          >
            ← Previous
          </button>
          <button
            onClick={() => setStep(Math.min(6, step + 1))}
            disabled={step === 6}
            className="px-6 py-2.5 bg-leather text-white rounded-lg text-sm font-body font-semibold hover:bg-leather/90 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
          >
            Next →
          </button>
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
