// DEBATE CONFIG DATA

// SITE_CONFIG is loaded dynamically from debates.json at startup.
// This allows the admin tool to update debate content without editing source code.
let SITE_CONFIG = null;


// ============================================================================
// HELPER FUNCTIONS
// ============================================================================

function formatTime(s) {
  if (!s && s !== 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function segmentTypeLabel(type) {
  return { opening: 'Opening', main: 'Main Argument', counter: 'Counter', rebuttal: 'Counter', closing: 'Closing' }[type] || type;
}

function teamColor(team, variant = 'bg') {
  const colors = {
    A: { bg: 'sf-bg-cedar', bgLight: 'sf-bg-cedar-light', text: 'sf-text-cedar', border: 'sf-border-cedar', ring: 'ring-yellow-600', badge: 'sf-badge-cedar' },
    B: { bg: 'sf-bg-leather', bgLight: 'sf-bg-leather-light', text: 'sf-text-leather', border: 'sf-border-leather', ring: 'ring-amber-800', badge: 'sf-badge-leather' },
  };
  return colors[team]?.[variant] || '';
}

function topicBadge(topic) {
  const colors = {
    'Homelessness': 'bg-blue-100 border-blue-300 text-blue-800',
  };
  return colors[topic] || 'bg-gray-100 border-gray-300 text-gray-800';
}

function App() {
  const [configLoaded, setConfigLoaded] = useState(false);
  const [loadError, setLoadError] = useState(null);

  useEffect(() => {
    fetch('debates.json')
      .then(res => {
        if (!res.ok) throw new Error(`Failed to load debates.json (${res.status})`);
        return res.json();
      })
      .then(data => {
        SITE_CONFIG = data;
        setConfigLoaded(true);
      })
      .catch(err => {
        console.error('Config load error:', err);
        setLoadError(err.message);
      });
  }, []);

  if (loadError) {
    return (
      <div className="min-h-screen bg-gray-50 flex items-center justify-center">
        <div className="bg-white rounded-lg shadow-lg p-8 max-w-md text-center">
          <div className="text-red-500 text-4xl mb-4">⚠</div>
          <h2 className="text-xl font-semibold text-gray-800 mb-2">Unable to Load</h2>
          <p className="text-gray-600 mb-4">Could not load debate configuration. Please check that <code className="bg-gray-100 px-1 rounded">debates.json</code> exists alongside this page.</p>
          <p className="text-sm text-gray-400">{loadError}</p>
        </div>
      </div>
    );
  }

  if (!configLoaded) {
    return (
      <div className="min-h-screen bg-leather flex items-center justify-center">
        <div className="text-center">
          <img src={SFHS_LOGO_SHIELD} alt="SFHS" className="h-16 w-auto mx-auto mb-4 animate-pulse" />
          <p className="text-white/70 font-body text-sm">Loading debates...</p>
        </div>
      </div>
    );
  }

  return <DebateReview />;
}

// ============================================================================

function DebateReview() {
  const [view, setView] = useState('home');
  const [debateIndex, setDebateIndex] = useState(0);
  const [segIndex, setSegIndex] = useState(0);
  const [currentTime, setCurrentTime] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const [playbackRate, setPlaybackRate] = useState(1);
  const [volume, setVolume] = useState(100);
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [notes, setNotes] = useState({});
  const [playbackMemory, setPlaybackMemory] = useState({});

  // Panel layout state
  const [hSplit, setHSplit] = useState(40); // horizontal split: top row height as %
  const [vSplit, setVSplit] = useState(50); // vertical split: left column width as %
  const [isDraggingH, setIsDraggingH] = useState(false);
  const [isDraggingV, setIsDraggingV] = useState(false);

  // Panel layout: maps each quadrant slot to a panel type
  // Panel types: 'outline', 'video', 'transcript', 'studyGuide', 'notes', 'compare', null
  const [layout, setLayout] = useState({
    topLeft: 'outline',
    topRight: 'video',
    bottomLeft: 'transcript',
    bottomRight: 'studyGuide',
  });
  const [freeNotes, setFreeNotes] = useState('');
  const [audioOnly, setAudioOnly] = useState(false);

  // Google Auth state
  const [user, setUser] = useState(null); // { name, email, picture, accessToken }
  const [isSigningIn, setIsSigningIn] = useState(false);
  const [authError, setAuthError] = useState(null);

  // Drive sync state
  const [isSaving, setIsSaving] = useState(false);
  const [isLoading, setIsLoading] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);
  const [driveFileId, setDriveFileId] = useState(null);

  // Bug report state
  const [showBugReport, setShowBugReport] = useState(false);
  const [bugType, setBugType] = useState('bug'); // 'bug' or 'idea'
  const [bugText, setBugText] = useState('');
  const [bugScreenshot, setBugScreenshot] = useState(null);
  const [isSendingBug, setIsSendingBug] = useState(false);
  const [bugSent, setBugSent] = useState(false);

  const playerRef = useRef(null);
  const playerContainerRef = useRef('player-container');
  const pollingRef = useRef(null);
  const transcriptRef = useRef(null);
  const isInitRef = useRef(false);
  const gridRef = useRef(null);

  const debate = SITE_CONFIG.debates[debateIndex];
  const segment = debate?.segments?.[segIndex];

  // YouTube API loader
  useEffect(() => {
    if (window.YT && window.YT.Player) return;
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  }, []);

  // Player init/re-init on segment change
  useEffect(() => {
    if (view !== 'review' || !segment) return;

    const buildPlayer = () => {
      if (playerRef.current) {
        try { playerRef.current.destroy(); } catch (e) {}
        playerRef.current = null;
      }
      // Ensure container div exists
      let container = document.getElementById('yt-player-wrap');
      if (container) container.innerHTML = '<div id="yt-player"></div>';

      playerRef.current = new window.YT.Player('yt-player', {
        videoId: segment.youtubeId,
        width: '100%',
        height: '100%',
        playerVars: { rel: 0, modestbranding: 1, playsinline: 1 },
        events: {
          onReady: (e) => {
            e.target.setPlaybackRate(playbackRate);
            e.target.setVolume(volume);
            // Resume from memory if available
            const memKey = segment.id;
            if (playbackMemory[memKey] && playbackMemory[memKey] > 2) {
              e.target.seekTo(playbackMemory[memKey], true);
            }
          },
          onStateChange: (e) => {
            setIsPlaying(e.data === window.YT.PlayerState.PLAYING);
          },
        },
      });
    };

    if (window.YT && window.YT.Player) {
      buildPlayer();
    } else {
      window.onYouTubeIframeAPIReady = buildPlayer;
    }

    return () => {
      if (pollingRef.current) clearInterval(pollingRef.current);
    };
  }, [view, segIndex, debateIndex, segment?.youtubeId]);

  // Time polling
  useEffect(() => {
    if (pollingRef.current) clearInterval(pollingRef.current);
    if (!isPlaying) return;

    pollingRef.current = setInterval(() => {
      if (playerRef.current?.getCurrentTime) {
        const t = playerRef.current.getCurrentTime();
        setCurrentTime(t);
        // Save to memory
        setPlaybackMemory(prev => ({ ...prev, [segment.id]: t }));
      }
    }, 150);

    return () => clearInterval(pollingRef.current);
  }, [isPlaying, segment?.id]);

  // Auto-scroll transcript
  useEffect(() => {
    if (!transcriptRef.current) return;
    const active = transcriptRef.current.querySelector('[data-active="true"]');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, [currentTime]);

  // Divider drag handlers
  useEffect(() => {
    const handleMouseMove = (e) => {
      if (!gridRef.current) return;
      const rect = gridRef.current.getBoundingClientRect();
      if (isDraggingH) {
        const pct = ((e.clientY - rect.top) / rect.height) * 100;
        setHSplit(Math.max(20, Math.min(80, pct)));
      }
      if (isDraggingV) {
        const pct = ((e.clientX - rect.left) / rect.width) * 100;
        setVSplit(Math.max(20, Math.min(80, pct)));
      }
    };
    const handleMouseUp = () => {
      setIsDraggingH(false);
      setIsDraggingV(false);
    };
    if (isDraggingH || isDraggingV) {
      document.addEventListener('mousemove', handleMouseMove);
      document.addEventListener('mouseup', handleMouseUp);
      document.body.style.cursor = isDraggingH ? 'row-resize' : 'col-resize';
      document.body.style.userSelect = 'none';
    }
    return () => {
      document.removeEventListener('mousemove', handleMouseMove);
      document.removeEventListener('mouseup', handleMouseUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    };
  }, [isDraggingH, isDraggingV]);

  // Current transcript index
  const currentTranscriptIdx = useMemo(() => {
    if (!segment?.transcript) return -1;
    let idx = -1;
    for (let i = 0; i < segment.transcript.length; i++) {
      if (currentTime >= segment.transcript[i].start) idx = i;
    }
    return idx;
  }, [currentTime, segment?.transcript]);

  // Highlighted outline
  const highlightedOutline = useMemo(() => {
    if (!segment?.outline) return [];
    return segment.outline.map((item) => {
      const inRange = currentTime >= item.startTime && currentTime <= item.endTime;
      return { ...item, active: inRange };
    });
  }, [currentTime, segment?.outline]);

  // Segments by type for comparison
  const segmentsByType = useMemo(() => {
    if (!debate) return {};
    const map = {};
    debate.segments.forEach((seg, i) => {
      if (!map[seg.type]) map[seg.type] = [];
      map[seg.type].push({ ...seg, index: i });
    });
    return map;
  }, [debate]);

  // Key moments for current segment
  const segKeyMoments = useMemo(() => {
    if (!debate || !segment) return [];
    return (debate.keyMoments || []).filter(km => km.segmentId === segment.id);
  }, [debate, segment]);

  // Count visible panels and toggle function
  // Panel type definitions
  const PANEL_TYPES = [
    { key: 'outline', label: 'Outline', icon: 'BookOpen' },
    { key: 'video', label: 'Video', icon: 'Play' },
    { key: 'transcript', label: 'Transcript', icon: 'FileText' },
    { key: 'studyGuide', label: 'Study Guide', icon: 'MessageSquare' },
    { key: 'notes', label: 'Notes', icon: 'FileText' },
    { key: 'compare', label: 'Compare', icon: 'ArrowLeftRight' },
  ];

  const SLOT_NAMES = ['topLeft', 'topRight', 'bottomLeft', 'bottomRight'];
  const SLOT_LABELS = { topLeft: 'Top Left', topRight: 'Top Right', bottomLeft: 'Bottom Left', bottomRight: 'Bottom Right' };

  const activeSlots = useMemo(() => {
    return SLOT_NAMES.filter(s => layout[s] !== null);
  }, [layout]);

  const assignPanel = (slot, panelType) => {
    setLayout(prev => {
      const next = { ...prev };
      // If this panel type is already assigned somewhere else, swap
      const existingSlot = SLOT_NAMES.find(s => prev[s] === panelType);
      if (existingSlot && existingSlot !== slot) {
        next[existingSlot] = prev[slot]; // swap: old slot gets what was in target
      }
      next[slot] = panelType;
      return next;
    });
  };

  const clearSlot = (slot) => {
    setLayout(prev => {
      const next = { ...prev };
      // Don't allow clearing all slots
      const filled = SLOT_NAMES.filter(s => s !== slot && prev[s] !== null);
      if (filled.length === 0) return prev;
      next[slot] = null;
      return next;
    });
  };

  // Search handler
  const handleSearch = useCallback((q) => {
    setSearchQuery(q);
    if (!q.trim()) { setSearchResults([]); return; }
    const lower = q.toLowerCase();
    const results = [];
    debate.segments.forEach((seg, si) => {
      seg.transcript.forEach((t) => {
        if (t.text.toLowerCase().includes(lower)) {
          results.push({ segIndex: si, segLabel: `${segmentTypeLabel(seg.type)} (${seg.team === 'A' ? debate.teamA.name : debate.teamB.name})`, ...t });
        }
      });
    });
    setSearchResults(results);
  }, [debate]);

  // Player controls
  const seekTo = (t) => {
    if (playerRef.current?.seekTo) {
      playerRef.current.seekTo(t, true);
      setCurrentTime(t);
    }
  };

  const togglePlay = () => {
    if (!playerRef.current) return;
    if (isPlaying) playerRef.current.pauseVideo();
    else playerRef.current.playVideo();
  };

  const changeRate = () => {
    const rates = [0.5, 0.75, 1, 1.25, 1.5, 2];
    const next = rates[(rates.indexOf(playbackRate) + 1) % rates.length];
    setPlaybackRate(next);
    if (playerRef.current?.setPlaybackRate) playerRef.current.setPlaybackRate(next);
  };

  const changeVolume = (val) => {
    setVolume(val);
    if (playerRef.current?.setVolume) playerRef.current.setVolume(val);
  };

  const goToSegment = (i) => {
    setSegIndex(i);
    setCurrentTime(0);
    setIsPlaying(false);
  };

  const saveGuidedResponse = (promptIdx, response) => {
    const key = `${debateIndex}-${segIndex}-${promptIdx}`;
    setNotes(prev => ({
      ...prev,
      [key]: response,
    }));
  };

  const saveEvaluationResponse = (evalId, response) => {
    const key = `${debateIndex}-eval-${evalId}`;
    setNotes(prev => ({
      ...prev,
      [key]: response,
    }));
  };

  const getGuidedResponse = (promptIdx) => {
    const key = `${debateIndex}-${segIndex}-${promptIdx}`;
    return notes[key] || '';
  };

  const getEvaluationResponse = (evalId) => {
    const key = `${debateIndex}-eval-${evalId}`;
    return notes[key] || '';
  };

  // Group debates by period
  const debatesByPeriod = useMemo(() => {
    const map = {};
    SITE_CONFIG.debates.forEach((d, di) => {
      const period = d.period || 'Other';
      if (!map[period]) map[period] = [];
      map[period].push({ ...d, globalIndex: di });
    });
    return map;
  }, []);

  const periodOrder = ['1st', '4th'];
  const periodLabels = { '1st': 'Period 1', '4th': 'Period 4' };
  const availablePeriods = periodOrder.filter(p => debatesByPeriod[p]);
  const [activePeriod, setActivePeriod] = useState(availablePeriods[0] || '4th');

  // Topic badge colors
  const topicBadge = (topic) => {
    const map = {
      'Homelessness': 'bg-orange-100 text-orange-800 border-orange-200',
      'Opioid Epidemic': 'bg-red-100 text-red-800 border-red-200',
      'Health Insurance': 'bg-teal-100 text-teal-800 border-teal-200',
    };
    return map[topic] || 'bg-gray-100 text-gray-700 border-gray-200';
  };

  // Google Sign-In
  const handleGoogleSignIn = useCallback(() => {
    setIsSigningIn(true);
    setAuthError(null);

    const client = window.google?.accounts?.oauth2?.initTokenClient({
      client_id: GOOGLE_CONFIG.clientId,
      scope: GOOGLE_CONFIG.scopes + ' email profile',
      callback: (response) => {
        if (response.error) {
          setAuthError('Sign-in failed. Please try again.');
          setIsSigningIn(false);
          return;
        }
        // Get user info
        fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: `Bearer ${response.access_token}` }
        })
        .then(r => r.json())
        .then(info => {
          if (!info.email?.endsWith('@' + GOOGLE_CONFIG.allowedDomain)) {
            setAuthError('Please sign in with your @sfhs.com school account.');
            setIsSigningIn(false);
            return;
          }
          setUser({
            name: info.name,
            email: info.email,
            picture: info.picture,
            accessToken: response.access_token,
          });
          setIsSigningIn(false);
        })
        .catch(() => {
          setAuthError('Could not verify account. Please try again.');
          setIsSigningIn(false);
        });
      },
    });

    if (client) {
      client.requestAccessToken();
    } else {
      setAuthError('Google Sign-In is not available. Please refresh the page.');
      setIsSigningIn(false);
    }
  }, []);

  const handleSignOut = () => {
    if (user?.accessToken) {
      window.google?.accounts?.oauth2?.revoke(user.accessToken);
    }
    setUser(null);
    setDriveFileId(null);
    setLastSaved(null);
  };

  // Drive: Find existing notes file
  const findDriveFile = useCallback(async (accessToken) => {
    try {
      const query = encodeURIComponent(`name='${GOOGLE_CONFIG.driveFileName}' and trashed=false`);
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&spaces=drive&fields=files(id,name)`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      const data = await res.json();
      return data.files?.[0]?.id || null;
    } catch { return null; }
  }, []);

  // Drive: Load notes
  const loadNotesFromDrive = useCallback(async () => {
    if (!user?.accessToken) return;
    setIsLoading(true);
    try {
      let fileId = driveFileId;
      if (!fileId) {
        fileId = await findDriveFile(user.accessToken);
        if (fileId) setDriveFileId(fileId);
      }
      if (!fileId) { setIsLoading(false); return; }

      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: `Bearer ${user.accessToken}` }
      });
      const data = await res.json();
      if (data.notes) setNotes(data.notes);
      if (data.playbackMemory) setPlaybackMemory(data.playbackMemory);
      if (data.freeNotes) setFreeNotes(data.freeNotes);
      if (data.preferences) {
        if (data.preferences.layout) setLayout(data.preferences.layout);
        if (data.preferences.hSplit != null) setHSplit(data.preferences.hSplit);
        if (data.preferences.vSplit != null) setVSplit(data.preferences.vSplit);
        if (data.preferences.audioOnly != null) setAudioOnly(data.preferences.audioOnly);
        if (data.preferences.playbackRate != null) {
          setPlaybackRate(data.preferences.playbackRate);
          if (playerRef.current?.setPlaybackRate) playerRef.current.setPlaybackRate(data.preferences.playbackRate);
        }
        if (data.preferences.volume != null) {
          setVolume(data.preferences.volume);
          if (playerRef.current?.setVolume) playerRef.current.setVolume(data.preferences.volume);
        }
      }
      setLastSaved(data.lastSaved || null);
    } catch (e) {
      console.error('Failed to load notes:', e);
    }
    setIsLoading(false);
  }, [user, driveFileId, findDriveFile]);

  // Drive: Save notes
  const saveNotesToDrive = useCallback(async () => {
    if (!user?.accessToken) return;
    setIsSaving(true);
    try {
      const payload = JSON.stringify({
        notes,
        playbackMemory,
        freeNotes,
        preferences: {
          layout,
          hSplit,
          vSplit,
          audioOnly,
          playbackRate,
          volume,
        },
        lastSaved: new Date().toISOString(),
        userEmail: user.email,
      });

      let fileId = driveFileId;
      if (!fileId) {
        fileId = await findDriveFile(user.accessToken);
        if (fileId) setDriveFileId(fileId);
      }

      if (fileId) {
        // Update existing file
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
          method: 'PATCH',
          headers: {
            Authorization: `Bearer ${user.accessToken}`,
            'Content-Type': 'application/json',
          },
          body: payload,
        });
      } else {
        // Create new file
        const metadata = {
          name: GOOGLE_CONFIG.driveFileName,
          mimeType: 'application/json',
        };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', new Blob([payload], { type: 'application/json' }));

        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
          method: 'POST',
          headers: { Authorization: `Bearer ${user.accessToken}` },
          body: form,
        });
        const data = await res.json();
        if (data.id) setDriveFileId(data.id);
      }

      setLastSaved(new Date().toISOString());
    } catch (e) {
      console.error('Failed to save notes:', e);
    }
    setIsSaving(false);
  }, [user, notes, playbackMemory, freeNotes, layout, hSplit, vSplit, audioOnly, playbackRate, volume, driveFileId, findDriveFile]);

  // Load notes on sign-in
  useEffect(() => {
    if (user) loadNotesFromDrive();
  }, [user]);

  // Auto-save notes every 15 seconds when signed in and data changes
  const autoSaveRef = useRef(null);
  const hasUnsavedRef = useRef(false);
  useEffect(() => {
    if (!user) return;
    hasUnsavedRef.current = true;
    if (autoSaveRef.current) clearTimeout(autoSaveRef.current);
    autoSaveRef.current = setTimeout(() => {
      saveNotesToDrive();
      hasUnsavedRef.current = false;
    }, 15000);
    return () => { if (autoSaveRef.current) clearTimeout(autoSaveRef.current); };
  }, [notes, playbackMemory, freeNotes, layout, hSplit, vSplit, audioOnly, playbackRate, volume, user, saveNotesToDrive]);

  // Save when user tabs away or minimizes
  useEffect(() => {
    const handleVisibility = () => {
      if (document.visibilityState === 'hidden' && user && hasUnsavedRef.current) {
        saveNotesToDrive();
        hasUnsavedRef.current = false;
      }
    };
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, [user, saveNotesToDrive]);

  // Prompt before closing if there are unsaved changes
  useEffect(() => {
    const handleBeforeUnload = (e) => {
      if (hasUnsavedRef.current && user) {
        // Attempt a final save
        saveNotesToDrive();
      }
      // Only show browser prompt if user has entered any notes at all
      const hasContent = Object.keys(notes).length > 0 || freeNotes.trim().length > 0;
      if (hasContent && hasUnsavedRef.current) {
        e.preventDefault();
        e.returnValue = '';
      }
    };
    window.addEventListener('beforeunload', handleBeforeUnload);
    return () => window.removeEventListener('beforeunload', handleBeforeUnload);
  }, [user, notes, freeNotes, saveNotesToDrive]);

  // Bug report: take screenshot
  const takeBugScreenshot = useCallback(async () => {
    try {
      const canvas = await window.html2canvas(document.body, {
        scale: 0.5,
        logging: false,
        useCORS: true,
        allowTaint: true,
        ignoreElements: (el) => el.classList?.contains('bug-fab') || el.classList?.contains('bug-report-panel'),
      });
      return canvas.toDataURL('image/png');
    } catch {
      return null;
    }
  }, []);

  // Bug report: submit via webhook or fallback
  const submitBugReport = useCallback(async () => {
    if (!bugText.trim()) return;
    setIsSendingBug(true);

    const screenshot = await takeBugScreenshot();
    setBugScreenshot(screenshot);

    const report = {
      type: bugType,
      message: bugText,
      userName: user ? user.name : 'Anonymous',
      userEmail: user ? user.email : 'not signed in',
      page: view,
      segment: view === 'review' ? `${debate?.topic} — Seg ${segIndex + 1} (${segment?.label})` : 'Home',
      timestamp: new Date().toISOString(),
      screenshot: screenshot || '',
      userAgent: navigator.userAgent,
      url: window.location.href,
    };

    let sent = false;

    // Try Google Apps Script webhook first
    if (GOOGLE_CONFIG.bugReportWebhookUrl) {
      try {
        await fetch(GOOGLE_CONFIG.bugReportWebhookUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(report),
        });
        sent = true;
      } catch (e) {
        console.error('Webhook failed, trying fallback:', e);
      }
    }

    // Fallback: save report to student's Drive (if signed in)
    if (!sent && user?.accessToken) {
      try {
        const fileName = `bug-report-${Date.now()}.json`;
        const metadata = { name: fileName, mimeType: 'application/json' };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' }));
        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
          method: 'POST',
          headers: { Authorization: `Bearer ${user.accessToken}` },
          body: form,
        });
        sent = true;
      } catch (e) {
        console.error('Drive fallback also failed:', e);
      }
    }

    // Last resort fallback: mailto
    if (!sent) {
      const subject = encodeURIComponent(`[${bugType === 'bug' ? 'Bug' : 'Idea'}] Debate Review — ${user?.name || 'Student'}`);
      const body = encodeURIComponent(
        `Type: ${bugType === 'bug' ? 'Bug Report' : 'Feature Idea'}\n` +
        `From: ${report.userName} (${report.userEmail})\n` +
        `Page: ${report.page}\nSegment: ${report.segment}\n` +
        `Time: ${report.timestamp}\n\nMessage:\n${bugText}`
      );
      window.open(`mailto:bcannon@snapfituniforms.com?subject=${subject}&body=${body}`, '_blank');
    }

    setBugSent(true);
    setIsSendingBug(false);
    setTimeout(() => {
      setBugSent(false);
      setBugText('');
      setBugScreenshot(null);
      setShowBugReport(false);
    }, 2000);
  }, [bugType, bugText, user, view, debate, segIndex, segment, takeBugScreenshot]);

  // ======================== HOME VIEW ========================
  if (view === 'home') {
    return (
      <div className="min-h-screen bg-gray-50">
        {/* SFHS Branded Banner */}
        <header className="bg-leather shadow-md">
          <div className="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
            <div className="flex items-center gap-4">
              <img src={SFHS_LOGO_SHIELD} alt="Saint Francis High School" className="h-10 w-auto object-contain shrink-0 rounded-sm" style={{ filter: 'drop-shadow(0 0 1px rgba(255,255,255,0.5))' }} />
              <div className="border-l border-white/30 pl-4">
                <h1 className="text-xl font-headline text-white leading-tight">{SITE_CONFIG.courseTitle}</h1>
                <p className="text-sm text-white/70 font-body">{SITE_CONFIG.instructorName}</p>
              </div>
            </div>
            <div className="flex items-center gap-3">
              {user ? (
                <div className="flex items-center gap-2">
                  {user.picture && <img src={user.picture} alt="" className="w-7 h-7 rounded-full border border-white/30" />}
                  <div className="text-right">
                    <p className="text-sm font-semibold text-white font-body">{user.name}</p>
                    <button onClick={handleSignOut} className="text-xs text-white/60 hover:text-white font-body">Sign out</button>
                  </div>
                  {lastSaved && (
                    <span className="text-xs text-sunlight font-body ml-2">
                      Saved {new Date(lastSaved).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}
                    </span>
                  )}
                  {isSaving && <span className="text-xs text-white/50 font-body ml-2">Saving...</span>}
                </div>
              ) : (
                <button
                  onClick={handleGoogleSignIn}
                  disabled={isSigningIn}
                  className="px-4 py-1.5 bg-white/10 border border-white/30 rounded-lg text-sm font-medium text-white hover:bg-white/20 transition-colors flex items-center gap-2 font-body"
                >
                  <svg className="w-4 h-4" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#fff"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fff"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/></svg>
                  {isSigningIn ? 'Signing in...' : 'Sign in with Google'}
                </button>
              )}
            </div>
          </div>
          {authError && (
            <div className="max-w-6xl mx-auto px-6 pb-2">
              <p className="text-sm text-red-300 font-body">{authError}</p>
            </div>
          )}
        </header>

        <main className="max-w-6xl mx-auto px-6 py-8">
          {/* Mr. Cannon Note */}
          <div className="bg-cedar-light border border-cedar/20 rounded-lg p-4 mb-8">
            <div className="flex items-start gap-3">
              <BookOpen className="w-5 h-5 text-cedar mt-0.5 shrink-0" />
              <div>
                <p className="font-semibold text-leather mb-1 text-base">Note from {SITE_CONFIG.instructorName}</p>
                <p className="text-leather/80 text-base">{SITE_CONFIG.instructorNote}</p>
              </div>
            </div>
          </div>

          {!user && (
            <div className="bg-white border border-gray-200 rounded-lg p-4 mb-6 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <svg className="w-5 h-5 text-gray-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <p className="text-sm text-gray-600 font-body">Sign in with your <strong>@sfhs.com</strong> account to save your notes and pick up where you left off.</p>
              </div>
              <button onClick={handleGoogleSignIn} className="px-3 py-1.5 bg-leather text-white rounded text-sm font-semibold font-body hover:bg-leather/90 shrink-0">Sign in</button>
            </div>
          )}

          {/* Period Switcher */}
          {availablePeriods.length > 1 && (
            <div className="mb-8">
              <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-1.5 flex">
                {availablePeriods.map((p) => (
                  <button
                    key={p}
                    onClick={() => setActivePeriod(p)}
                    className={`flex-1 py-3 px-4 rounded-lg text-base font-semibold font-body transition-all duration-200 ${
                      activePeriod === p
                        ? 'bg-leather text-white shadow-md'
                        : 'text-gray-500 hover:text-leather hover:bg-leather/5'
                    }`}
                  >
                    {periodLabels[p] || `${p} Period`}
                    <span className={`ml-2 text-sm font-normal ${activePeriod === p ? 'text-white/70' : 'text-gray-400'}`}>
                      {debatesByPeriod[p].length} {debatesByPeriod[p].length === 1 ? 'debate' : 'debates'}
                    </span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Debates for active period */}
          {debatesByPeriod[activePeriod] && (
            <div className="mb-10">
              {debatesByPeriod[activePeriod].map((d) => (
                <div key={d.id} className="bg-white rounded-xl shadow-sm border mb-6 overflow-hidden">
                  <div className="px-6 py-4 border-b bg-gray-50">
                    <div className="flex items-center gap-3 mb-1">
                      <h3 className="text-xl font-headline text-gray-900">{d.topic}</h3>
                      {d.debateTopic && (
                        <span className={`px-2.5 py-0.5 rounded-full text-sm font-semibold border ${topicBadge(d.debateTopic)}`}>{d.debateTopic}</span>
                      )}
                    </div>
                    <p className="text-base text-gray-600 mt-1 font-body">{d.description}</p>
                  </div>

                  <div className="grid md:grid-cols-2 gap-0 divide-x">
                    {/* Team A */}
                    <div className="p-5">
                      <div className="flex items-center gap-2 mb-3">
                        <span className={`px-2.5 py-0.5 rounded text-sm font-semibold ${teamColor('A', 'badge')}`}>{d.teamA.name}</span>
                        <span className="text-sm text-gray-500">{d.teamA.members.join(', ')}</span>
                      </div>
                      <p className="text-base text-gray-700 mb-3 font-body">{d.teamA.position}</p>
                      <div className="space-y-1.5">
                        {d.teamA.keyStats.map((s, i) => (
                          <p key={i} className="text-sm text-gray-500 flex items-start gap-1.5">
                            <Star className="w-3.5 h-3.5 text-cedar mt-0.5 shrink-0" />
                            {s}
                          </p>
                        ))}
                      </div>
                    </div>

                    {/* Team B */}
                    <div className="p-5">
                      <div className="flex items-center gap-2 mb-3">
                        <span className={`px-2.5 py-0.5 rounded text-sm font-semibold ${teamColor('B', 'badge')}`}>{d.teamB.name}</span>
                        <span className="text-sm text-gray-500">{d.teamB.members.join(', ')}</span>
                      </div>
                      <p className="text-base text-gray-700 mb-3 font-body">{d.teamB.position}</p>
                      <div className="space-y-1.5">
                        {d.teamB.keyStats.map((s, i) => (
                          <p key={i} className="text-sm text-gray-500 flex items-start gap-1.5">
                            <Star className="w-3.5 h-3.5 text-leather mt-0.5 shrink-0" />
                            {s}
                          </p>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div className="px-6 py-4 border-t bg-gray-50 flex items-center justify-between">
                    <div className="flex gap-3 text-sm text-gray-500">
                      <span className="flex items-center gap-1"><Clock className="w-4 h-4" /> {d.segments.length} segments</span>
                      <span className="flex items-center gap-1"><Volume2 className="w-4 h-4" /> {formatTime(d.segments.reduce((a, s) => a + s.duration, 0))} total</span>
                    </div>
                    <button
                      onClick={() => { setDebateIndex(d.globalIndex); setSegIndex(0); setCurrentTime(0); setView('review'); }}
                      className="px-5 py-2.5 bg-leather text-white rounded-lg text-base font-semibold font-body hover:bg-leather/90 transition-colors"
                    >
                      Start Reviewing
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Handle any debates without a recognized period */}
          {Object.keys(debatesByPeriod).filter(p => !periodOrder.includes(p)).map((period) => (
            <div key={period} className="mb-10">
              <h2 className="text-xl font-headline text-leather mb-4">{period} Period</h2>
              {debatesByPeriod[period].map((d) => (
                <div key={d.id} className="bg-white rounded-xl shadow-sm border mb-6 overflow-hidden p-6">
                  <h3 className="font-headline text-lg">{d.topic}</h3>
                  <button
                    onClick={() => { setDebateIndex(d.globalIndex); setSegIndex(0); setCurrentTime(0); setView('review'); }}
                    className="mt-3 px-4 py-2 bg-leather text-white rounded-lg text-sm font-semibold font-body hover:bg-leather/90 transition-colors"
                  >
                    Start Reviewing
                  </button>
                </div>
              ))}
            </div>
          ))}
        </main>

        {/* Bug Report Widget */}
        <button className="bug-fab" onClick={() => setShowBugReport(!showBugReport)} title="Report a bug or share an idea">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </button>
        {showBugReport && (
          <div className="bug-report-panel">
            <div className="p-4 border-b bg-leather text-white">
              <div className="flex items-center justify-between">
                <h3 className="font-semibold text-sm font-body">Feedback</h3>
                <button onClick={() => setShowBugReport(false)} className="text-white/70 hover:text-white">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
              {user && <p className="text-xs text-white/70 mt-1 font-body">{user.name} ({user.email})</p>}
            </div>
            <div className="p-4">
              {bugSent ? (
                <div className="text-center py-6">
                  <p className="text-green-600 font-semibold text-sm font-body">Thanks for your feedback!</p>
                  <p className="text-gray-400 text-xs mt-1 font-body">Mr. Cannon will review it soon.</p>
                </div>
              ) : (
                <>
                  <div className="flex gap-2 mb-3">
                    <button
                      onClick={() => setBugType('bug')}
                      className={`flex-1 py-1.5 rounded text-xs font-medium border transition-colors font-body ${bugType === 'bug' ? 'bg-red-50 border-red-300 text-red-700' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}
                    >
                      Bug Report
                    </button>
                    <button
                      onClick={() => setBugType('idea')}
                      className={`flex-1 py-1.5 rounded text-xs font-medium border transition-colors font-body ${bugType === 'idea' ? 'bg-blue-50 border-blue-300 text-blue-700' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}
                    >
                      Feature Idea
                    </button>
                  </div>
                  <textarea
                    value={bugText}
                    onChange={(e) => setBugText(e.target.value)}
                    placeholder={bugType === 'bug' ? 'Describe the bug — what happened and what you expected...' : 'Describe your idea — what would make this tool better for you?'}
                    className="w-full border rounded-lg p-2 text-sm resize-none h-24 focus:outline-none focus:ring-2 focus:ring-leather/30 font-body mb-3"
                  />
                  <p className="text-xs text-gray-400 mb-3 font-body">A screenshot of the current page will be included automatically.</p>
                  {!user && <p className="text-xs text-amber-600 mb-3 font-body">Sign in with Google so Mr. Cannon knows who sent this.</p>}
                  <button
                    onClick={submitBugReport}
                    disabled={!bugText.trim() || isSendingBug}
                    className="w-full py-2 bg-leather text-white rounded-lg text-sm font-semibold font-body hover:bg-leather/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    {isSendingBug ? 'Sending...' : 'Send Feedback'}
                  </button>
                </>
              )}
            </div>
          </div>
        )}
      </div>
    );
  }

  // ======================== REVIEW VIEW ========================
  const getKeyMomentColor = (type) => {
    const colors = {
      'mr-cannon': 'text-yellow-400 fill-yellow-400',
      'evidence': 'text-blue-500 fill-blue-500',
      'argument': 'text-green-500 fill-green-500',
      'rhetoric': 'text-purple-500 fill-purple-500',
      'definition': 'text-orange-500 fill-orange-500',
      'context': 'text-gray-500 fill-gray-500',
      'structure': 'text-cyan-500 fill-cyan-500',
    };
    return colors[type] || colors['mr-cannon'];
  };

  const countAnsweredPrompts = () => {
    if (!segment?.prompts) return 0;
    let count = 0;
    for (let i = 0; i < segment.prompts.length; i++) {
      if (getGuidedResponse(i).trim()) count++;
    }
    return count;
  };

  const countAnsweredEvals = () => {
    if (!debate?.evaluationPrompts) return 0;
    let count = 0;
    for (const evalPrompt of debate.evaluationPrompts) {
      if (getEvaluationResponse(evalPrompt.id).trim()) count++;
    }
    return count;
  };

  // Render panel content based on panel type
  const renderPanelContent = (panelType, slotName) => {
    if (!panelType) {
      // Empty slot with panel chooser
      return (
        <div className="flex items-center justify-center h-full">
          <div className="text-center">
            <p className="text-sm text-gray-400 mb-3 font-body">Choose a panel</p>
            <div className="flex flex-wrap gap-2 justify-center">
              {PANEL_TYPES.map(({ key, label }) => (
                <button
                  key={key}
                  onClick={() => assignPanel(slotName, key)}
                  className="px-3 py-1.5 rounded text-xs font-medium border border-gray-300 text-gray-600 hover:bg-gray-100 font-body"
                >
                  {label}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    if (panelType === 'outline') {
      // Argument Outline
      return (
        <>
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-base font-bold text-gray-700 font-body">Argument Outline</h3>
            <span className={`px-2.5 py-0.5 rounded text-xs font-semibold ${teamColor(segment.team, 'badge')}`}>
              {segment.team === 'A' ? debate.teamA.name : debate.teamB.name}
            </span>
          </div>
          <div className="space-y-3">
            {highlightedOutline.map((item, i) => (
              <button
                key={i}
                onClick={() => seekTo(item.startTime)}
                className={`w-full text-left p-2.5 rounded-lg border transition-all ${
                  item.active
                    ? `${teamColor(segment.team, 'bgLight')} ${teamColor(segment.team, 'border')} ring-1 ${teamColor(segment.team, 'ring')}`
                    : 'border-gray-200 hover:bg-gray-50'
                }`}
              >
                <p className={`text-sm font-semibold mb-1 ${item.active ? teamColor(segment.team, 'text') : 'text-gray-800'}`}>
                  {item.title}
                </p>
                {item.bullets && item.bullets.map((b, bi) => (
                  <p key={bi} className="text-xs text-gray-500 ml-2 mt-0.5 font-body">• {b}</p>
                ))}
                <span className="text-xs text-gray-400 mt-1 block font-mono">{formatTime(item.startTime)}</span>
              </button>
            ))}
          </div>
        </>
      );
    }

    if (panelType === 'video') {
      // Video Player Controls (player iframe rendered separately outside slot loop)
      return (
        <>
          {/* Audio-only overlay — fills the player area */}
          {audioOnly && (
            <div className="flex-1 flex items-center justify-center z-10">
              <div className="text-center">
                <Volume2 className="w-8 h-8 text-gray-400 mx-auto mb-2" />
                <p className="text-xs text-gray-400 font-body">Audio Only Mode</p>
                <p className="text-sm text-white font-body mt-1">{segmentTypeLabel(segment.type)} — {segment.team === 'A' ? debate.teamA.name : debate.teamB.name}</p>
              </div>
            </div>
          )}
          {/* Spacer that matches where the external player iframe sits */}
          {!audioOnly && <div className="flex-1" />}

          {/* Progress bar with key moments */}
          <div className="relative h-2 bg-gray-700 cursor-pointer group"
            onClick={(e) => {
              const rect = e.currentTarget.getBoundingClientRect();
              const pct = (e.clientX - rect.left) / rect.width;
              seekTo(pct * segment.duration);
            }}
          >
            <div className="absolute h-full bg-blue-500 transition-all" style={{ width: `${(currentTime / segment.duration) * 100}%` }} />
            {segKeyMoments.map((km, i) => (
              <div
                key={i}
                className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 cursor-pointer"
                style={{ left: `${(km.time / segment.duration) * 100}%` }}
                title={km.label}
                onClick={(e) => { e.stopPropagation(); seekTo(km.time); }}
              >
                <Star className={`w-3 h-3 ${getKeyMomentColor(km.type)}`} />
              </div>
            ))}
          </div>

          {/* Controls */}
          <div className="bg-gray-800 px-3 py-1 flex items-center justify-between shrink-0">
            <div className="flex items-center gap-2">
              <button onClick={() => seekTo(Math.max(0, currentTime - 10))} className="text-gray-400 hover:text-white">
                <Rewind className="w-4 h-4" />
              </button>
              <button onClick={togglePlay} className="bg-white rounded-full p-1.5 hover:bg-gray-200 transition-colors">
                {isPlaying ? <Pause className="w-4 h-4 text-gray-900" /> : <Play className="w-4 h-4 text-gray-900" />}
              </button>
              <button onClick={() => seekTo(Math.min(segment.duration, currentTime + 10))} className="text-gray-400 hover:text-white">
                <FastForward className="w-4 h-4" />
              </button>
              <span className="text-xs text-gray-400 font-mono">{formatTime(currentTime)} / {formatTime(segment.duration)}</span>
              <div className="flex items-center gap-1 ml-2">
                <Volume2 className="w-3.5 h-3.5 text-gray-400" />
                <input
                  type="range"
                  min="0"
                  max="100"
                  value={volume}
                  onChange={(e) => changeVolume(Number(e.target.value))}
                  className="w-16 h-1 accent-white cursor-pointer"
                  style={{ accentColor: '#fff' }}
                />
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={changeRate} className="text-xs text-gray-400 hover:text-white border border-gray-600 rounded px-2 py-0.5">
                {playbackRate}x
              </button>
              {segIndex > 0 && (
                <button onClick={() => goToSegment(segIndex - 1)} className="text-gray-400 hover:text-white text-xs flex items-center gap-1">
                  <ChevronLeft className="w-4 h-4" /> Prev
                </button>
              )}
              {segIndex < debate.segments.length - 1 && (
                <button onClick={() => goToSegment(segIndex + 1)} className="text-gray-400 hover:text-white text-xs flex items-center gap-1">
                  Next <ChevronRight className="w-4 h-4" />
                </button>
              )}
            </div>
          </div>

          {/* Key moments strip */}
          {segKeyMoments.length > 0 && (
            <div className="bg-gray-800 border-t border-gray-700 px-2 py-0.5 flex gap-2 overflow-x-auto shrink-0" style={{ fontSize: '10px' }}>
              {segKeyMoments.map((km, i) => (
                <button
                  key={i}
                  onClick={() => seekTo(km.time)}
                  className="flex items-center gap-1 text-gray-300 hover:text-white whitespace-nowrap shrink-0 font-body"
                >
                  <Star className={`w-2.5 h-2.5 ${getKeyMomentColor(km.type)}`} /> {km.label} ({formatTime(km.time)})
                </button>
              ))}
            </div>
          )}
        </>
      );
    }

    if (panelType === 'transcript') {
      // Transcript
      return (
        <>
          <h3 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2 font-body">
            <FileText className="w-4 h-4" /> Transcript
          </h3>
          <div className="space-y-1">
            {segment.transcript.map((t, i) => {
              const isActive = i === currentTranscriptIdx;
              return (
                <button
                  key={i}
                  data-active={isActive}
                  onClick={() => seekTo(t.start)}
                  className={`w-full text-left px-2 py-1 rounded text-xs transition-colors ${
                    isActive
                      ? `${teamColor(segment.team, 'bgLight')} ${teamColor(segment.team, 'text')}`
                      : 'text-gray-700 hover:bg-gray-100'
                  }`}
                >
                  <span className="text-gray-400 font-mono text-xs">{formatTime(t.start)}</span> {t.text}
                </button>
              );
            })}
          </div>
        </>
      );
    }

    if (panelType === 'studyGuide') {
      // Guided Notes / Study Guide
      return (
        <>
          <div className="mb-3">
            <h3 className="text-sm font-bold text-gray-700 mb-1 font-body">Study Guide</h3>
            <p className="text-xs text-gray-500 font-body">{segmentTypeLabel(segment.type)} — {segment.team === 'A' ? debate.teamA.name : debate.teamB.name}</p>
          </div>

          {/* Segment Prompts */}
          {segment?.prompts && segment.prompts.length > 0 && (
            <div className="mb-4">
              <div className="flex items-center justify-between mb-2">
                <h4 className="text-xs font-semibold text-gray-700 uppercase font-body">Segment Questions</h4>
                <span className="text-xs text-gray-500 font-body">{countAnsweredPrompts()}/{segment.prompts.length} answered</span>
              </div>
              <div className="space-y-2">
                {segment.prompts.map((prompt, pidx) => {
                  const response = getGuidedResponse(pidx);
                  const isAnswered = response.trim().length > 0;
                  return (
                    <div key={pidx} className="bg-gray-50 rounded border p-2">
                      <p className="text-xs font-semibold text-gray-700 mb-1 font-body">{pidx + 1}. {prompt}</p>
                      <textarea
                        value={response}
                        onChange={(e) => saveGuidedResponse(pidx, e.target.value)}
                        placeholder="Your answer..."
                        className="w-full text-xs p-2 border rounded resize-none h-16 focus:outline-none focus:ring-1 focus:ring-blue-400 font-body"
                      />
                      {isAnswered && <p className="text-xs text-green-600 mt-1 font-body">✓ Answered</p>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Evaluation Prompts */}
          {debate?.evaluationPrompts && (
            <div>
              <div className="flex items-center justify-between mb-2">
                <h4 className="text-xs font-semibold text-gray-700 uppercase font-body">Exam Prep</h4>
                <span className="text-xs text-gray-500 font-body">{countAnsweredEvals()}/{debate.evaluationPrompts.length} answered</span>
              </div>
              <div className="space-y-2">
                {debate.evaluationPrompts.map((evalPrompt) => {
                  const response = getEvaluationResponse(evalPrompt.id);
                  const isAnswered = response.trim().length > 0;
                  return (
                    <div key={evalPrompt.id} className="bg-amber-50 rounded border border-amber-200 p-2">
                      <p className="text-xs font-semibold text-gray-700 mb-1 font-body">{evalPrompt.category}</p>
                      <p className="text-xs text-gray-600 mb-1 font-body">{evalPrompt.prompt}</p>
                      <textarea
                        value={response}
                        onChange={(e) => saveEvaluationResponse(evalPrompt.id, e.target.value)}
                        placeholder="Your answer..."
                        className="w-full text-xs p-2 border rounded resize-none h-12 focus:outline-none focus:ring-1 focus:ring-amber-400 font-body"
                      />
                      {isAnswered && <p className="text-xs text-green-600 mt-1 font-body">✓ Answered</p>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </>
      );
    }

    if (panelType === 'notes') {
      // Free-form Notes
      return (
        <>
          <h3 className="text-sm font-bold text-gray-700 mb-2 font-body">My Notes</h3>
          <p className="text-xs text-gray-400 mb-2 font-body">Free-form notes — jot down anything you notice.</p>
          <textarea
            value={freeNotes}
            onChange={(e) => setFreeNotes(e.target.value)}
            placeholder="Type your notes here..."
            className="w-full h-[calc(100%-60px)] text-sm p-3 border rounded-lg resize-none focus:outline-none focus:ring-1 focus:ring-leather/30 font-body"
          />
        </>
      );
    }

    if (panelType === 'compare') {
      // Comparison chart
      return (
        <>
          <h3 className="text-sm font-bold text-gray-700 mb-3 font-body">Side-by-Side Comparison</h3>
          <div className="space-y-3">
            {Object.entries(segmentsByType).map(([type, segs]) => (
              <div key={type} className="bg-gray-50 rounded-lg border p-3">
                <h4 className="text-xs font-bold text-gray-600 uppercase mb-2 font-body">{segmentTypeLabel(type)}</h4>
                <div className="grid grid-cols-2 gap-3">
                  {segs.map((seg) => {
                    const teamName = seg.team === 'A' ? debate.teamA.name : debate.teamB.name;
                    return (
                      <div key={seg.id} className={`p-2 rounded ${teamColor(seg.team, 'bgLight')} border ${teamColor(seg.team, 'border')}`}>
                        <div className="flex justify-between items-center mb-1">
                          <span className={`text-xs font-semibold ${teamColor(seg.team, 'text')}`}>{teamName}</span>
                          <button onClick={() => goToSegment(seg.index)} className="text-xs text-gray-500 hover:text-gray-800 font-body">Watch</button>
                        </div>
                        <div className="space-y-1">
                          {seg.outline.map((o, oi) => (
                            <p key={oi} className="text-xs text-gray-600 font-body">{o.title}</p>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </>
      );
    }
  };

  return (
    <div className="h-screen bg-gray-100 flex flex-col overflow-hidden relative">
      {/* SFHS Branded Banner — Review View */}
      <header className="bg-leather px-4 py-1.5 flex items-center justify-between shrink-0 z-30 shadow-md">
        <div className="flex items-center gap-3">
          <img src={SFHS_LOGO_SHIELD} alt="SFHS" className="h-7 w-auto object-contain shrink-0" style={{ filter: 'drop-shadow(0 0 1px rgba(255,255,255,0.5))' }} />
          <button onClick={() => setView('home')} className="text-white/70 hover:text-white flex items-center gap-1 text-sm font-body">
            <ChevronLeft className="w-4 h-4" /> Home
          </button>
          <span className="text-white/30">|</span>
          <h2 className="font-semibold text-white text-sm font-body">{debate.topic}</h2>
        </div>
        <div className="relative w-56">
          <Search className="w-3.5 h-3.5 absolute left-2.5 top-1/2 -translate-y-1/2 text-white/50" />
          <input
            type="text"
            value={searchQuery}
            onChange={(e) => handleSearch(e.target.value)}
            placeholder="Search transcripts..."
            className="w-full pl-8 pr-7 py-1 border border-white/20 rounded text-xs bg-white/10 text-white placeholder-white/40 focus:outline-none focus:ring-1 focus:ring-sunlight/50 font-body"
          />
          {searchQuery && (
            <button onClick={() => { setSearchQuery(''); setSearchResults([]); }} className="absolute right-2 top-1/2 -translate-y-1/2">
              <X className="w-3 h-3 text-white/50" />
            </button>
          )}
        </div>
        <div className="flex items-center gap-2">
          {user ? (
            <div className="flex items-center gap-2">
              <button
                onClick={saveNotesToDrive}
                disabled={isSaving}
                className="px-3 py-1 rounded text-xs font-medium border border-sunlight/50 text-sunlight hover:bg-white/10 transition-colors font-body"
              >
                {isSaving ? 'Saving...' : lastSaved ? `Saved ${new Date(lastSaved).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}` : 'Save Notes'}
              </button>
              {user.picture && <img src={user.picture} alt="" className="w-6 h-6 rounded-full border border-white/30" />}
            </div>
          ) : (
            <button
              onClick={handleGoogleSignIn}
              disabled={isSigningIn}
              className="px-3 py-1 rounded text-xs font-medium bg-white/10 border border-white/30 text-white hover:bg-white/20 transition-colors font-body flex items-center gap-1.5"
            >
              <svg width="14" height="14" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#fff"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fff"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/></svg>
              Sign in to save
            </button>
          )}
        </div>
      </header>

      {/* Segment Navigation - Grouped by Phase */}
      <div className="bg-white border-b px-4 py-1.5 flex items-center gap-1 shrink-0 overflow-x-auto">
        {['opening', 'main', 'rebuttal', 'closing'].map((phase, phaseIdx) => {
          const phaseSegs = debate.segments.map((seg, i) => ({ ...seg, index: i })).filter(s => s.type === phase);
          if (phaseSegs.length === 0) return null;
          return (
            <React.Fragment key={phase}>
              {phaseIdx > 0 && <div className="w-px h-8 bg-gray-200 mx-1 shrink-0" />}
              <div className="flex items-center gap-1 shrink-0">
                <span className="text-xs text-gray-400 font-body mr-0.5">{segmentTypeLabel(phase)}</span>
                {phaseSegs.map((seg) => {
                  const isActive = seg.index === segIndex;
                  const teamLabel = seg.team === 'A' ? 'Grp 1' : 'Grp 2';
                  const hasMem = playbackMemory[seg.id] > 2;
                  return (
                    <button
                      key={seg.id}
                      onClick={() => goToSegment(seg.index)}
                      className={`px-2.5 py-1 rounded text-xs font-medium whitespace-nowrap transition-colors flex items-center gap-1 font-body ${
                        isActive
                          ? `${teamColor(seg.team, 'bg')} text-white`
                          : `bg-gray-100 text-gray-600 hover:bg-gray-200`
                      }`}
                    >
                      {hasMem && !isActive && <Bookmark className="w-3 h-3 text-gray-400" />}
                      {teamLabel}
                    </button>
                  );
                })}
              </div>
            </React.Fragment>
          );
        })}
      </div>

      {/* Search Results Dropdown (appears below tabs when searching) */}
      {searchResults.length > 0 && (
        <div className="bg-white border-b px-4 py-1 shrink-0 max-h-32 overflow-y-auto">
          <div className="space-y-0.5">
            {searchResults.slice(0, 10).map((r, i) => (
              <button
                key={i}
                onClick={() => { goToSegment(r.segIndex); setTimeout(() => seekTo(r.start), 500); setSearchQuery(''); setSearchResults([]); }}
                className="w-full text-left text-xs p-1.5 rounded hover:bg-gray-50 flex gap-2 font-body"
              >
                <span className="text-gray-400 shrink-0">{r.segLabel} @ {formatTime(r.start)}</span>
                <span className="text-gray-700 truncate">{r.text}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Panel Toolbar */}
      <div className="bg-gray-50 border-b px-4 py-1 flex items-center justify-between shrink-0">
        <div className="flex items-center gap-3">
          {SLOT_NAMES.map((slot) => (
            <div key={slot} className="flex items-center gap-1">
              <span className="text-xs text-gray-400 font-body">{SLOT_LABELS[slot]}:</span>
              <select
                value={layout[slot] || ''}
                onChange={(e) => {
                  const val = e.target.value;
                  if (val === '') clearSlot(slot);
                  else assignPanel(slot, val);
                }}
                className="text-xs border rounded px-1.5 py-0.5 bg-white text-gray-700 font-body focus:outline-none focus:ring-1 focus:ring-leather/30"
              >
                <option value="">— Empty —</option>
                {PANEL_TYPES.map(({ key, label }) => (
                  <option key={key} value={key}>{label}</option>
                ))}
              </select>
            </div>
          ))}
        </div>
        <div className="flex items-center gap-2">
          {SLOT_NAMES.some(s => layout[s] === 'video') && (
            <button
              onClick={() => setAudioOnly(!audioOnly)}
              className={`px-2 py-0.5 rounded text-xs font-medium border transition-colors font-body ${
                audioOnly ? 'bg-blue-50 border-blue-300 text-blue-700' : 'border-gray-200 text-gray-500 hover:bg-gray-50'
              }`}
            >
              {audioOnly ? 'Show Video' : 'Audio Only'}
            </button>
          )}
          <button
            onClick={() => {
              setLayout({ topLeft: 'outline', topRight: 'video', bottomLeft: 'transcript', bottomRight: 'studyGuide' });
              setHSplit(40);
              setVSplit(50);
            }}
            className="px-2 py-0.5 rounded text-xs font-medium border border-gray-200 text-gray-500 hover:bg-gray-50 font-body"
          >
            Reset
          </button>
        </div>
      </div>

      {/* Resizable Panel Layout */}
      <div className="flex-1 relative overflow-hidden" ref={gridRef} style={{ minHeight: 0 }}>
        {(() => {
          const hasLeft = layout.topLeft !== null || layout.bottomLeft !== null;
          const hasRight = layout.topRight !== null || layout.bottomRight !== null;
          const hasTop = layout.topLeft !== null || layout.topRight !== null;
          const hasBottom = layout.bottomLeft !== null || layout.bottomRight !== null;

          const leftW = hasLeft && hasRight ? vSplit : (hasLeft ? 100 : 0);
          const rightW = hasLeft && hasRight ? (100 - vSplit) : (hasRight ? 100 : 0);
          const topH = hasTop && hasBottom ? hSplit : (hasTop ? 100 : 0);
          const bottomH = hasTop && hasBottom ? (100 - hSplit) : (hasBottom ? 100 : 0);

          return (
            <>
              {/* Each slot */}
              {[
                { slot: 'topLeft', style: { top: 0, left: 0, width: `${leftW}%`, height: `${topH}%`, borderRight: hasRight ? '1px solid #e5e7eb' : 'none', borderBottom: hasBottom ? '1px solid #e5e7eb' : 'none' } },
                { slot: 'topRight', style: { top: 0, left: `${leftW}%`, width: `${rightW}%`, height: `${topH}%`, borderBottom: hasBottom ? '1px solid #e5e7eb' : 'none' } },
                { slot: 'bottomLeft', style: { top: `${topH}%`, left: 0, width: `${leftW}%`, height: `${bottomH}%`, borderRight: hasRight ? '1px solid #e5e7eb' : 'none' } },
                { slot: 'bottomRight', style: { top: `${topH}%`, left: `${leftW}%`, width: `${rightW}%`, height: `${bottomH}%` } },
              ].filter(({ slot }) => layout[slot] !== null).map(({ slot, style }) => {
                const panelType = layout[slot];
                const isVideoPanel = panelType === 'video';
                const isTranscriptPanel = panelType === 'transcript';
                return (
                  <div key={slot} className={`absolute ${isVideoPanel ? `flex flex-col ${audioOnly ? 'bg-gray-800' : 'bg-gray-900'}` : 'bg-white overflow-y-auto p-3'}`} style={style} ref={isTranscriptPanel ? transcriptRef : null}>
                    {renderPanelContent(panelType, slot)}
                  </div>
                );
              })}

              {/* Persistent Video Player — rendered outside slot loop so it never unmounts */}
              {(() => {
                const videoSlot = SLOT_NAMES.find(s => layout[s] === 'video');
                if (!videoSlot) return null;
                const slotPositions = {
                  topLeft: { top: 0, left: 0, width: `${leftW}%`, height: `${topH}%` },
                  topRight: { top: 0, left: `${leftW}%`, width: `${rightW}%`, height: `${topH}%` },
                  bottomLeft: { top: `${topH}%`, left: 0, width: `${leftW}%`, height: `${bottomH}%` },
                  bottomRight: { top: `${topH}%`, left: `${leftW}%`, width: `${rightW}%`, height: `${bottomH}%` },
                };
                const pos = slotPositions[videoSlot];
                // If audio only, hide player off-screen but keep in DOM
                if (audioOnly) {
                  return (
                    <div id="yt-player-wrap" style={{ position: 'absolute', left: '-9999px', width: '1px', height: '1px' }}>
                      <div id="yt-player"></div>
                    </div>
                  );
                }
                // Position player iframe over the video slot, leaving space for controls at bottom (~80px)
                return (
                  <div id="yt-player-wrap" className="absolute z-[1]" style={{
                    top: pos.top,
                    left: pos.left,
                    width: pos.width,
                    height: pos.height,
                    pointerEvents: 'none',
                    paddingBottom: '80px', // reserve space for controls
                  }}>
                    <div id="yt-player" className="w-full h-full" style={{ pointerEvents: 'auto' }}></div>
                  </div>
                );
              })()}

              {/* Horizontal Divider — full-width drag zone with two grip handles */}
              {hasTop && hasBottom && (
                <div
                  className="absolute left-0 right-0 z-10 cursor-row-resize group"
                  style={{ top: `${topH}%`, height: '6px', marginTop: '-3px' }}
                  onMouseDown={() => setIsDraggingH(true)}
                >
                  <div className={`h-full w-full relative ${isDraggingH ? 'bg-blue-400/30' : 'hover:bg-blue-400/20'}`}>
                    {/* Left-half grip: centered in left column */}
                    <div className="absolute top-1/2 -translate-y-1/2" style={{ left: `${leftW / 2}%`, transform: `translateX(-50%) translateY(-50%)` }}>
                      <div className={`w-10 h-1 rounded-full ${isDraggingH ? 'bg-blue-400' : 'bg-gray-300 group-hover:bg-blue-400'}`} />
                    </div>
                    {/* Right-half grip: centered in right column */}
                    <div className="absolute top-1/2 -translate-y-1/2" style={{ left: `${leftW + rightW / 2}%`, transform: `translateX(-50%) translateY(-50%)` }}>
                      <div className={`w-10 h-1 rounded-full ${isDraggingH ? 'bg-blue-400' : 'bg-gray-300 group-hover:bg-blue-400'}`} />
                    </div>
                  </div>
                </div>
              )}

              {/* Vertical Divider — full-height drag zone with two grip handles */}
              {hasLeft && hasRight && (
                <div
                  className="absolute top-0 bottom-0 z-10 cursor-col-resize group"
                  style={{ left: `${vSplit}%`, width: '6px', marginLeft: '-3px' }}
                  onMouseDown={() => setIsDraggingV(true)}
                >
                  <div className={`w-full h-full relative ${isDraggingV ? 'bg-blue-400/30' : 'hover:bg-blue-400/20'}`}>
                    {/* Top-half grip: centered in top row */}
                    <div className="absolute left-1/2 -translate-x-1/2" style={{ top: `${topH / 2}%`, transform: `translateX(-50%) translateY(-50%)` }}>
                      <div className={`h-10 w-1 rounded-full ${isDraggingV ? 'bg-blue-400' : 'bg-gray-300 group-hover:bg-blue-400'}`} />
                    </div>
                    {/* Bottom-half grip: centered in bottom row */}
                    <div className="absolute left-1/2 -translate-x-1/2" style={{ top: `${topH + bottomH / 2}%`, transform: `translateX(-50%) translateY(-50%)` }}>
                      <div className={`h-10 w-1 rounded-full ${isDraggingV ? 'bg-blue-400' : 'bg-gray-300 group-hover:bg-blue-400'}`} />
                    </div>
                  </div>
                </div>
              )}
            </>
          );
        })()}
      </div>

      {/* Bug Report Widget */}
        <button className="bug-fab" onClick={() => setShowBugReport(!showBugReport)} title="Report a bug or share an idea">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </button>
        {showBugReport && (
          <div className="bug-report-panel">
            <div className="p-4 border-b bg-leather text-white">
              <div className="flex items-center justify-between">
                <h3 className="font-semibold text-sm font-body">Feedback</h3>
                <button onClick={() => setShowBugReport(false)} className="text-white/70 hover:text-white">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
              {user && <p className="text-xs text-white/70 mt-1 font-body">{user.name} ({user.email})</p>}
            </div>
            <div className="p-4">
              {bugSent ? (
                <div className="text-center py-6">
                  <p className="text-green-600 font-semibold text-sm font-body">Thanks for your feedback!</p>
                  <p className="text-gray-400 text-xs mt-1 font-body">Mr. Cannon will review it soon.</p>
                </div>
              ) : (
                <>
                  <div className="flex gap-2 mb-3">
                    <button
                      onClick={() => setBugType('bug')}
                      className={`flex-1 py-1.5 rounded text-xs font-medium border transition-colors font-body ${bugType === 'bug' ? 'bg-red-50 border-red-300 text-red-700' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}
                    >
                      Bug Report
                    </button>
                    <button
                      onClick={() => setBugType('idea')}
                      className={`flex-1 py-1.5 rounded text-xs font-medium border transition-colors font-body ${bugType === 'idea' ? 'bg-blue-50 border-blue-300 text-blue-700' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}
                    >
                      Feature Idea
                    </button>
                  </div>
                  <textarea
                    value={bugText}
                    onChange={(e) => setBugText(e.target.value)}
                    placeholder={bugType === 'bug' ? 'Describe the bug — what happened and what you expected...' : 'Describe your idea — what would make this tool better for you?'}
                    className="w-full border rounded-lg p-2 text-sm resize-none h-24 focus:outline-none focus:ring-2 focus:ring-leather/30 font-body mb-3"
                  />
                  <p className="text-xs text-gray-400 mb-3 font-body">A screenshot of the current page will be included automatically.</p>
                  {!user && <p className="text-xs text-amber-600 mb-3 font-body">Sign in with Google so Mr. Cannon knows who sent this.</p>}
                  <button
                    onClick={submitBugReport}
                    disabled={!bugText.trim() || isSendingBug}
                    className="w-full py-2 bg-leather text-white rounded-lg text-sm font-semibold font-body hover:bg-leather/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    {isSendingBug ? 'Sending...' : 'Send Feedback'}
                  </button>
                </>
              )}
            </div>
          </div>
        )}
      </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
